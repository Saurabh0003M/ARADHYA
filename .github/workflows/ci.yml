name: Aradhya CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate syntax (all source files)
        run: |
          python -c "
          import py_compile, pathlib
          errors = []
          for f in pathlib.Path('src/aradhya').rglob('*.py'):
              try:
                  py_compile.compile(str(f), doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(str(e))
          if errors:
              print('COMPILATION ERRORS:')
              for e in errors:
                  print(e)
              exit(1)
          print('All source files compile OK')
          "

      - name: Validate skills load
        run: |
          python -c "
          from src.aradhya.skills import load_skills
          from pathlib import Path
          r = load_skills(Path('.'))
          print(f'Skills loaded: {r.count}, Active: {r.active_count}')
          assert r.count >= 5, f'Expected at least 5 skills, got {r.count}'
          "

      - name: Run unit tests
        run: |
          python -m pytest tests/ -q --override-ini="addopts=" -k "not test_invalid_manifest"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check src/aradhya/ --select E,F,W --ignore E501
